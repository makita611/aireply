<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイリプ — 顧客一覧</title>
  <link rel="stylesheet" href="/css/style.css?v=20260428">
  <style>
    .customer-grid { padding: 16px 16px 100px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state p { margin-top: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <span class="brand header-title">アイリプ</span>
    <div class="header-actions">
      <button class="btn btn-icon" onclick="location.href='/settings'" title="設定">⚙️</button>
      <button class="btn btn-icon" id="logout-btn" title="ログアウト">🚪</button>
    </div>
  </header>

  <!-- AIコンシェルジュカード -->
  <div id="concierge-card" style="margin:12px 16px 0;padding:14px 16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(212,175,55,0.3);border-radius:12px">
    <!-- アバター＋挨拶 -->
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:8px">
      <img src="/img/airipu-avatar.svg" width="52" height="52"
           style="border-radius:50%;flex-shrink:0;border:1.5px solid rgba(212,175,55,0.45)">
      <div style="flex:1;min-width:0">
        <div style="font-size:0.7rem;color:var(--accent-gold);margin-bottom:2px;letter-spacing:0.05em">AI秘書 アイリプ</div>
        <div id="concierge-greeting" style="font-size:0.95rem;line-height:1.6;color:var(--text-primary)">読み込み中...</div>
      </div>
    </div>
    <div id="concierge-alert" style="margin-bottom:6px"></div>
    <!-- インラインチャット入力（タップで全画面チャットへ） -->
    <button id="inline-chat-bar"
      style="display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;
             background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
             border-radius:20px;cursor:pointer;font-family:inherit">
      <span style="flex:1;text-align:left;color:var(--text-secondary);font-size:0.88rem">アイリプに話しかける...</span>
      <span style="font-size:1rem">💬</span>
    </button>
  </div>

  <!-- チャットウィジェット・記憶管理はchat-widget.jsが動的に注入 -->

  <!-- 検索 + 並び替え -->
  <div style="padding: 12px 16px 0;">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="名前で検索...">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:4px;align-items:center">
      <select id="sort-select" style="flex:1;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text-primary);font-family:inherit;font-size:0.85rem;padding:8px 10px;min-height:36px">
        <option value="last_visit">最終来店日順</option>
        <option value="name">名前順（ア〜ン）</option>
        <option value="priority">優先度順</option>
        <option value="temperature">温度感順</option>
      </select>
      <button id="archive-toggle" class="btn btn-secondary" style="width:auto;padding:0 12px;font-size:0.8rem;min-height:36px;white-space:nowrap">
        アーカイブ表示
      </button>
    </div>
  </div>

  <!-- 顧客リスト -->
  <div class="customer-grid" id="customer-list">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>

  <!-- 新規追加FAB -->
  <button class="fab" id="add-btn" title="顧客を追加">＋</button>

  <!-- 新規追加モーダル -->
  <div class="modal-overlay hidden" id="add-modal">
    <div class="modal">
      <div class="modal-title">顧客を追加</div>
      <div id="add-error" class="error-msg hidden"></div>
      <div class="form-group">
        <label>名前 <span style="color:var(--accent-rose)">*</span></label>
        <input type="text" id="add-name" placeholder="例: 田中さん">
      </div>
      <div class="form-group">
        <label>呼び名</label>
        <input type="text" id="add-nickname" placeholder="例: たなっち">
      </div>
      <div class="form-group">
        <label>背景色（誤爆防止）</label>
        <input type="color" id="add-bgcolor" value="#1a1a2e" style="height:44px;padding:4px 8px;">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="add-cancel">キャンセル</button>
        <button class="btn btn-primary" id="add-submit">追加</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/dashboard.js?v=20260428"></script>
</body>
</html>
