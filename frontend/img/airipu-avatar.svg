<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <circle cx="40" cy="40" r="39" fill="#0d0d1a" stroke="#d4af37" stroke-width="1.5"/>
  <!-- Hair back -->
  <ellipse cx="40" cy="36" rx="23" ry="27" fill="#7c3aed"/>
  <!-- Face -->
  <circle cx="40" cy="44" r="19" fill="#fde8d0"/>
  <!-- Hair front top -->
  <path d="M24 28 Q29 11 40 15 Q51 11 56 28" fill="#7c3aed"/>
  <!-- Left hair strand -->
  <path d="M19 40 Q14 53 19 65" stroke="#7c3aed" stroke-width="7.5" fill="none" stroke-linecap="round"/>
  <!-- Right hair strand -->
  <path d="M61 40 Q66 53 61 65" stroke="#7c3aed" stroke-width="7.5" fill="none" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="33" cy="45" rx="3.8" ry="4.4" fill="#1e1040"/>
  <circle cx="34.6" cy="43.2" r="1.4" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="47" cy="45" rx="3.8" ry="4.4" fill="#1e1040"/>
  <circle cx="48.6" cy="43.2" r="1.4" fill="white"/>
  <!-- Blush -->
  <ellipse cx="27" cy="51" rx="4.5" ry="2.5" fill="rgba(255,100,140,0.45)"/>
  <ellipse cx="53" cy="51" rx="4.5" ry="2.5" fill="rgba(255,100,140,0.45)"/>
  <!-- Smile -->
  <path d="M36 55 Q40 59.5 44 55" stroke="#e06080" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Gold hairpin -->
  <circle cx="52" cy="22" r="3.8" fill="#d4af37"/>
  <circle cx="52" cy="22" r="1.6" fill="#fff8e0"/>
  <!-- Body (shoulders) -->
  <ellipse cx="40" cy="79" rx="15" ry="9" fill="#7c3aed" opacity="0.8"/>
</svg>
