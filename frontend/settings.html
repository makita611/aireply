<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google Tag Manager -->

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイリプ — キャスト設定</title>
  <link rel="stylesheet" href="/css/style.css?v=20260428">
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P6VNBWH3" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <header class="header">
    <button class="btn btn-icon" onclick="history.back()">←</button>
    <span class="brand" style="font-size:1rem">キャスト設定</span>
    <div style="width:44px"></div>
  </header>

  <div style="padding:20px 16px 60px;">
    <div id="settings-error" class="error-msg hidden"></div>
    <div id="settings-success" class="hidden" style="background:rgba(129,199,132,0.15);border:1px solid rgba(129,199,132,0.4);border-radius:8px;color:#81c784;padding:10px 14px;margin-bottom:12px;font-size:0.85rem;">
      保存しました ✓
    </div>

    <div class="section-label">AI秘書のアイコン</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px" id="avatar-grid">
      <!-- JSで生成 -->
    </div>

    <div class="section-label">基本情報</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0">
        <label>源氏名</label>
        <input type="text" id="stage-name" placeholder="例: あかね">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>年齢</label>
        <input type="number" id="cast-age" placeholder="例: 22" min="18" max="60">
      </div>
    </div>
    <div class="form-group">
      <label>お店の名前</label>
      <input type="text" id="shop-name" placeholder="例: Club Elegance">
    </div>
    <div class="form-group">
      <label>自分の趣味・好きなこと</label>
      <input type="text" id="cast-hobbies" placeholder="例: カフェ巡り、映画、コスメ">
    </div>

    <div class="section-label" style="margin-top:8px">AIキャラ設定</div>
    <div class="form-group">
      <label>口癖・話し方・キャラ設定</label>
      <textarea id="character-prompt"
        placeholder="例: 語尾に「だよ〜」をつける。絵文字多め。甘えた感じで話す。相手を「〇〇くん」と呼ぶ。"
        style="min-height:120px"></textarea>
    </div>

    <div class="form-group">
      <label>過去の神対応LINEサンプル（AI学習用）</label>
      <textarea id="sample-lines"
        placeholder="例:&#10;「昨日楽しかったよ〜😊 また来てね♡」&#10;「仕事大変そうだったね、ちゃんと休めた？」"
        style="min-height:160px"></textarea>
    </div>

    <button class="btn btn-primary" id="save-btn">設定を保存</button>

    <div class="mt-24 card" style="border-color:rgba(212,175,55,0.2);margin-bottom:16px">
      <div class="section-label">ご要望・不具合報告</div>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px">
        使ってみて気になったことや改善希望をぜひ教えてください。<br>開発に反映していきます。
      </p>
      <button class="btn btn-secondary" onclick="location.href='/feedback'"
              style="text-align:center">
        📝 要望・フィードバックを送る
      </button>
    </div>

    <div class="card" style="border-color:rgba(255,255,255,0.06)">
      <div class="section-label">データについて</div>
      <ul style="font-size:0.82rem;color:var(--text-secondary);line-height:2;padding-left:16px;">
        <li>AIがお客様のデータを学習に使うことはありません</li>
        <li>データは暗号化して保存されています</li>
        <li>いつでも全データを削除できます</li>
      </ul>
    </div>

    <!-- アカウント情報 -->
    <div class="card mt-24" style="border-color:rgba(212,175,55,0.2)">
      <div class="section-label">アカウント情報</div>

      <!-- メールアドレス表示 -->
      <div class="form-group" style="margin-bottom:8px">
        <label>メールアドレス</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="text" id="current-email" readonly
            style="flex:1;background:var(--bg-input);opacity:0.7;cursor:default">
          <button class="btn btn-secondary" id="email-toggle-btn"
            style="white-space:nowrap;padding:10px 14px;font-size:0.8rem">変更</button>
        </div>
      </div>

      <!-- メール変更フォーム（折りたたみ） -->
      <div id="email-form" style="display:none;margin-bottom:16px;padding:14px;background:var(--bg-input);border-radius:10px">
        <div class="form-group" style="margin-bottom:10px">
          <label>新しいメールアドレス</label>
          <input type="email" id="new-email" placeholder="new@example.com">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label>現在のパスワード（確認）</label>
          <input type="password" id="email-confirm-password" placeholder="パスワードを入力">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="email-save-btn" style="flex:1;font-size:0.9rem">変更を保存</button>
          <button class="btn btn-secondary" id="email-cancel-btn" style="padding:10px 14px;font-size:0.9rem">キャンセル</button>
        </div>
      </div>

      <!-- パスワード変更ボタン -->
      <div style="margin-bottom:8px">
        <button class="btn btn-secondary" id="pw-toggle-btn"
          style="width:100%;font-size:0.85rem">🔑 パスワードを変更する</button>
      </div>

      <!-- パスワード変更フォーム（折りたたみ） -->
      <div id="pw-form" style="display:none;padding:14px;background:var(--bg-input);border-radius:10px">
        <div class="form-group" style="margin-bottom:10px">
          <label>現在のパスワード</label>
          <input type="password" id="current-password" placeholder="現在のパスワード">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label>新しいパスワード（8文字以上）</label>
          <input type="password" id="new-password" placeholder="新しいパスワード">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label>新しいパスワード（確認）</label>
          <input type="password" id="new-password-confirm" placeholder="もう一度入力">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="pw-save-btn" style="flex:1;font-size:0.9rem">パスワードを変更</button>
          <button class="btn btn-secondary" id="pw-cancel-btn" style="padding:10px 14px;font-size:0.9rem">キャンセル</button>
        </div>
      </div>

      <div id="account-error" class="error-msg hidden" style="margin-top:8px"></div>
      <div id="account-success" class="hidden"
        style="margin-top:8px;background:rgba(129,199,132,0.15);border:1px solid rgba(129,199,132,0.4);border-radius:8px;color:#81c784;padding:10px 14px;font-size:0.85rem;"></div>
    </div>
  </div>

  <script type="module" src="/js/settings.js?v=20260428"></script>
</body>
</html>
